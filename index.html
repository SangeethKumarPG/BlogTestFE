<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="shared.css">
</head>

<body>
    <header class="main-header">
        <h1>BLOG</h1>
        <nav class="main-header__navbar">
            <ul>
                <li><a href="#">HOME</a></li>
                <li><a href="#">ABOUT</a></li>
                <li><a href="#">CONTACT</a></li>

        </ul>

        </nav>
    </header>

    <main class="main-content">
        <button id="getBlogsBtn">Get Blogs</button>  

        <button class="post-modal__openbtn"  id="addPostBtn">Add Blog</button>

        <button class="edit-btn" onclick="openEditModal()">Edit Blog</button>

        <button class="delete-btn" id="deleteBtn">Delete Blog</button>
         <div id="blogContainer"></div> 

    </main>

   

    <div id="postModal" class="post-modal">
        <div class="post-modal__form">
            <h3>Create New Post</h3>
            <input class="post-modal__title" id="postTitleInput" placeholder="Post Title">
            <textarea class="post-modal__content" id="postContentInput" placeholder="Post Content" rows="4"></textarea>
            <div class="post-modal__actions">
                <button class="post-modal__createbtn" id="createPostBtn">Create</button>
                <button class="post-modal__closebtn" id="closePostModal">Cancel</button>
            </div>
        </div>
    </div>

    <div id="editModal" class="edit-modal">
        <div class="edit-form">

            <input id="editId" placeholder="Post ID">

            <input id="editTitle" placeholder="Title">

            <textarea id="editContent" placeholder="Content"></textarea>

            <div class="edit-actions">
                <button id="updateBtn">Update</button>
                <button id="cancelEdit">Cancel</button>
            </div>

        </div>
    </div>


    <footer class="footer-links">
        <ul>
            <li><a href="#">HOME</a></li>
            <li><a href="#">ABOUT</a></li>
            <li><a href="#">CONTACT</a></li>
        </ul>
    </footer>
    <script src="script.js"></script>

</body>

</html>
